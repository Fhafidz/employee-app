<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#13a19c" opacity="0.1" stroke="#13a19c" stroke-width="2"/>
  
  <!-- Main logo shape - Building/Corporate -->
  <g transform="translate(100, 100)">
    <!-- Building structure -->
    <rect x="-35" y="-45" width="70" height="80" fill="none" stroke="#13a19c" stroke-width="2.5" rx="4"/>
    
    <!-- Windows grid -->
    <circle cx="-20" cy="-30" r="5" fill="#13a19c"/>
    <circle cx="-20" cy="-10" r="5" fill="#13a19c"/>
    <circle cx="-20" cy="10" r="5" fill="#13a19c"/>
    
    <circle cx="0" cy="-30" r="5" fill="#fc6b3f"/>
    <circle cx="0" cy="-10" r="5" fill="#fc6b3f"/>
    <circle cx="0" cy="10" r="5" fill="#fc6b3f"/>
    
    <circle cx="20" cy="-30" r="5" fill="#13a19c"/>
    <circle cx="20" cy="-10" r="5" fill="#13a19c"/>
    <circle cx="20" cy="10" r="5" fill="#13a19c"/>
    
    <!-- Door -->
    <rect x="-8" y="20" width="16" height="20" fill="none" stroke="#13a19c" stroke-width="2"/>
    <circle cx="-2" cy="30" r="2" fill="#13a19c"/>
    
    <!-- Accent element -->
    <path d="M -35 -45 L 0 -65 L 35 -45" fill="none" stroke="#fc6b3f" stroke-width="2.5"/>
  </g>
  
  <!-- Company name styling -->
  <text x="100" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="#13a19c" font-family="Arial, sans-serif">BIIS CORP</text>
</svg>